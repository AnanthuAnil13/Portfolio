<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ananthu Anil | About</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/script.js"></script>
  <script defer src="js/about.js"></script>
</head>

<body class="page about-page">
  <header class="topbar topbar--glass">
    <div class="topbar-inner">
      <div class="brand"><a href="index.html">Ananthu Anil</a></div>

      <nav class="nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html" aria-current="page">About</a>
        <a href="#experience">Experience</a>
      </nav>

      <div class="controls">
        <div class="mode">
          <span data-mode-label>Mode</span>
          <div class="toggle" role="switch" tabindex="0" aria-checked="false" aria-label="Toggle dark mode" data-toggle></div>
        </div>
      </div>
    </div>
  </header>

  <main class="about-main">
    <div class="cin-bg about-bg" aria-hidden="true">
      <div class="cin-glow cin-glow--center"></div>
      <div class="cin-glow cin-glow--right"></div>
    </div>

    <section class="about-hero">
      <div class="about-hero__content">
        <p class="about-hero__eyebrow">About</p>
        <h1 class="about-hero__name" data-about-name>Loading profile...</h1>
        <p class="about-hero__title" data-about-title></p>
        <p class="about-hero__summary" data-about-summary></p>

        <div class="about-hero__actions">
          <a class="about-action about-action--primary" href="#" data-about-email>Email</a>
          <a class="about-action" href="#" target="_blank" rel="noreferrer" data-about-linkedin>LinkedIn</a>
          <button
            class="about-action"
            type="button"
            aria-label="Open resume"
            aria-haspopup="dialog"
            aria-controls="resume-modal"
            aria-expanded="false"
            data-resume-open
          >
            Resume
          </button>
        </div>
      </div>

      <aside class="about-hero__meta" data-about-meta></aside>
    </section>

    <section class="about-grid">
      <section class="about-panel about-panel--experience" id="experience">
        <div class="about-panel__header">
          <div>
            <p class="about-panel__eyebrow">Career</p>
            <h2 class="about-panel__title">Experience Journey</h2>
          </div>
          <p class="about-panel__lede">A timeline of engineering, research, and security work across the last few years.</p>
        </div>
        <div class="about-timeline" data-about-experience></div>
      </section>

      <section class="about-panel" id="education">
        <div class="about-panel__header">
          <p class="about-panel__eyebrow">Study</p>
          <h2 class="about-panel__title">Education</h2>
        </div>
        <div class="about-stack" data-about-education></div>
      </section>
    </section>
  </main>

  <div class="resume-modal" id="resume-modal" hidden data-resume-modal>
    <div class="resume-modal__backdrop" data-resume-close></div>
    <div class="resume-modal__panel" role="dialog" aria-modal="true" aria-labelledby="resume-modal-title">
      <div class="resume-modal__header">
        <p class="resume-modal__eyebrow">Resume</p>
        <h2 class="resume-modal__title" id="resume-modal-title">Ananthu Anil</h2>
        <button class="resume-modal__close" type="button" aria-label="Close resume" data-resume-close>
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="resume-modal__body">
        <iframe
          class="resume-modal__frame"
          src="assets/resume.pdf"
          title="Ananthu Anil resume"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
