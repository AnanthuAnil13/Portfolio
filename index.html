<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ananthu Anil | Portfolio</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="js/script.js"></script>
  <script type="module" src="js/avatar-viewer.js"></script>
</head>

<body class="page">
  <!-- Top Bar (transparent over dark hero) -->
  <header class="topbar topbar--hero">
    <div class="topbar-inner">
      <div class="brand">Ananthu Anil</div>

      <nav class="nav" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#thoughts">Thoughts</a>
        <a href="#archive">Archive</a>
      </nav>

      <div class="controls">
        <div class="mode">
          <span data-mode-label>Mode</span>
          <div class="toggle" role="switch" tabindex="0" aria-checked="false" aria-label="Toggle dark mode" data-toggle></div>
        </div>

        <div class="icon-badges" aria-hidden="true">
          <div class="badge" title="Play">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 7l10 5-10 5V7z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="badge" title="Potion">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M10 2h4M10 2v4l-4 6a6 6 0 0010 0l-4-6V2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 14h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="badge" title="Notebook">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 3h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z" stroke="currentColor" stroke-width="2"/>
              <path d="M9 7h6M9 11h6M9 15h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Cinematic Hero -->
  <main class="hero hero--cinematic">

    <!-- Ambient background glows -->
    <div class="cin-bg" aria-hidden="true">
      <div class="cin-glow cin-glow--center"></div>
      <div class="cin-glow cin-glow--right"></div>
    </div>

    <!-- Floating orb -->
    <div class="cin-orb" aria-hidden="true"></div>

    <!-- Left: greeting + name -->
    <div class="cin-left">
      <p class="cin-hello">Hello! I'm</p>
      <h1 class="cin-name">ANANTHU<br>ANIL</h1>
    </div>

    <!-- Center: interactive 3D avatar -->
    <div class="cin-character">
      <div id="avatar-scene" class="cin-avatar-scene" aria-hidden="true"></div>
      <p id="avatar-loading" class="cin-loader">Loading 3D avatar...</p>
    </div>

    <!-- Right: role title -->
    <div class="cin-right">
      <span class="cin-a">A</span>
      <p class="cin-role" data-role>Cybersecurity<br>Researcher</p>
    </div>

    <!-- Social sidebar -->
    <nav class="cin-socials" aria-label="Social links">

    <a class="cin-resume" href="mailto:ananthuanil4u@gmail.com">CONTACT ⊡</a>

  </main>
</body>
</html>
